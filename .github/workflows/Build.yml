name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Set up package manager
        run: corepack enable

      - name: Build & Test
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm test
